version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    userns_mode: keep-id
    volumes:
      - .:/workspace:z
      - node_modules:/workspace/node_modules
    command: sh -c "pnpm install && pnpm run dev -- --host 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      OPENBASE_ENCRYPTION_KEY: ${OPENBASE_ENCRYPTION_KEY}
      OPENBASE_AI_SERVICE_URL: http://ai:8000
      OPENBASE_AI_SERVICE_TOKEN: ${OPENBASE_AI_SERVICE_TOKEN}
    depends_on:
      - db
      - ai

  ai:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    environment:
      OPENBASE_APP_URL: http://app:3000
      OPENBASE_AI_SERVICE_TOKEN: ${OPENBASE_AI_SERVICE_TOKEN}
      PYDANTIC_AI_MODEL: ${PYDANTIC_AI_MODEL:-openai:gpt-5.2}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-07-01-preview}
    depends_on:
      - db

  db:
    image: postgres:17.10
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro,z
    ports:
      - "5432:5432"

volumes:
  postgres-data:
  node_modules:
